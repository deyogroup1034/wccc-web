name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Daily rebuild so statically-generated "upcoming events" auto-expire: the
  # build recomputes the Central-time cutoff (see src/lib/events.ts) and drops
  # past events within ~24h — no manual upkeep. ~6am Central (cron is UTC).
  schedule:
    - cron: "0 11 * * *"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (OpenNext → Cloudflare Workers)
        run: npx opennextjs-cloudflare build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
