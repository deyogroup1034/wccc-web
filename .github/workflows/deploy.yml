name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Daily rebuild so statically-generated "upcoming events" auto-expire: the
  # build recomputes the Central-time cutoff (see src/lib/events.ts) and drops
  # past events within ~24h — no manual upkeep. ~6am Central (cron is UTC).
  schedule:
    - cron: "0 11 * * *"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (OpenNext → Cloudflare Workers)
        run: npx opennextjs-cloudflare build
        env:
          # Cloudflare Web Analytics beacon (src/app/layout.tsx). Unset secret
          # → beacon simply doesn't render, so this is safe before setup.
          NEXT_PUBLIC_CF_BEACON_TOKEN: ${{ secrets.NEXT_PUBLIC_CF_BEACON_TOKEN }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
